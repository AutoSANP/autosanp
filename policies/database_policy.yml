- name: MySQL Database Policy
  hosts: managed_hosts
  become: yes

  tasks:
    - name: Install MySQL server
      apt:
        name: mysql-server
        state: present
        update_cache: yes

    - name: Ensure MySQL is running
      service:
        name: mysql
        state: started

    - name: Ensure MySQL starts on boot
      service:
        name: mysql
        enabled: yes
        
        
        

